<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tour Manager — App</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--paper-100); }
  #root { height: 100vh; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--paper-400); border-radius: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="DaySheet.jsx"></script>
<script type="text/babel" src="RoutingMap.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function App() {
    const { AppShell, DaySheet, RoutingMap, Dashboard } = window;
    const [active, setActive] = React.useState('daysheet');
    const screens = { daysheet: DaySheet, routing: RoutingMap, dashboard: Dashboard };
    const Screen = screens[active] || DaySheet;
    return (
      <AppShell active={active} onNav={setActive}>
        <Screen />
      </AppShell>
    );
  }
  function Boot() {
    // Wait until babel-loaded sibling scripts have registered on window.
    const [ready, setReady] = React.useState(!!(window.AppShell && window.DaySheet));
    React.useEffect(() => {
      if (ready) return;
      const t = setInterval(() => {
        if (window.AppShell && window.DaySheet && window.RoutingMap && window.Dashboard) {
          setReady(true); clearInterval(t);
        }
      }, 30);
      return () => clearInterval(t);
    }, [ready]);
    if (!ready) return null;
    return <App />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Boot />);
</script>
</body>
</html>
