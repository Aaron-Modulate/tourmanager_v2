<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Marker" subtitle="The electric screenprint-blue brand mark + tints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  .row{display:flex;height:150px;font-family:var(--font-mono);font-size:10px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .sw b{font-weight:700;letter-spacing:0.04em}
  .sw span{opacity:0.75}
  .on-dark{color:var(--white)}
  .on-light{color:var(--ink-700)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw on-dark" style="background:var(--marker-700)"><b>marker-700</b><span>#1629A8</span></div>
    <div class="sw on-dark" style="background:var(--marker-600)"><b>marker-600</b><span>#1E3AD0</span></div>
    <div class="sw on-dark" style="background:var(--marker-500);flex:1.6"><b>marker-500 · brand</b><span>#2B4FF0</span></div>
    <div class="sw on-light" style="background:var(--marker-100)"><b>marker-100</b><span>#DCE2FF</span></div>
    <div class="sw on-light" style="background:var(--marker-050);box-shadow:inset 1px 0 0 var(--paper-300)"><b>marker-050</b><span>#EEF1FF</span></div>
  </div>
</body>
</html>
