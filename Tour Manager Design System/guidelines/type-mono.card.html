<!-- @dsCard group="Type" viewport="700x180" name="Mono — Space Mono" subtitle="The data voice: times, codes, stamps, overlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  .wrap{background:var(--ink-900);height:180px;padding:18px 22px;box-sizing:border-box;font-family:var(--font-mono);color:var(--paper-100);display:flex;flex-direction:column;justify-content:center;gap:12px}
  .time{font-size:38px;font-weight:700;letter-spacing:-0.01em}
  .time small{font-size:14px;color:var(--marker-500)}
  .labels{display:flex;gap:10px;flex-wrap:wrap}
  .ov{font-size:11px;letter-spacing:0.24em;color:var(--ink-300);text-transform:uppercase}
  .code{border:1px solid var(--ink-700);border-radius:2px;padding:4px 8px;font-size:11px;letter-spacing:0.08em;color:var(--paper-100)}
  .code b{color:var(--marker-500)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="ov">// RUN OF SHOW</div>
    <div class="time">19:45 <small>DOORS</small> &nbsp; 21:00 <small>SET</small></div>
    <div class="labels">
      <span class="code">VENUE <b>BRX-02</b></span>
      <span class="code">CREW <b>A-LIST</b></span>
      <span class="code">PASS <b>AAA</b></span>
      <span class="code">DAY <b>014/060</b></span>
    </div>
  </div>
</body>
</html>
