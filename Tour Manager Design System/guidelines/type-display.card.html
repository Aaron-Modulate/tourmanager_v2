<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  .wrap{background:var(--paper-50);height:190px;padding:18px 22px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:6px}
  .d1{font-family:var(--font-display);font-weight:800;font-size:56px;line-height:0.95;letter-spacing:-0.02em;color:var(--ink-900)}
  .d2{font-family:var(--font-display);font-weight:700;font-size:30px;line-height:1;letter-spacing:-0.02em;color:var(--ink-900)}
  .lab{font-family:var(--font-mono);font-size:10px;letter-spacing:0.24em;color:var(--marker-600);text-transform:uppercase}
</style>
</head>
<body>
  <div class="wrap">
    <div class="lab">Display · 800 · tracking -0.02em</div>
    <div class="d1">SHOW NIGHT</div>
    <div class="d2">Everything, front of house.</div>
  </div>
</body>
</html>
